<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }

        input, textarea {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--tg-theme-hint-color);
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h3>📩 Отправить запрос</h3>

<input type="text" id="name" placeholder="Ваше имя">
<textarea id="issue" placeholder="Опишите ваш вопрос..." rows="5"></textarea>
<button id="send_btn">Отправить в группу</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    if (tg.initDataUnsafe?.user) {
        const user = tg.initDataUnsafe.user;
        document.getElementById("name").value =
            (user.first_name || "") + " " + (user.last_name || "");
    }

    document.getElementById("send_btn").onclick = () => {
        let name = document.getElementById("name").value.trim();
        let issue = document.getElementById("issue").value.trim();

        if (name.length < 2 || issue.length < 5) {
            tg.showAlert("Пожалуйста, заполните все поля корректно");
            return;
        }

        tg.showConfirm("Отправить запрос в группу?", (confirmed) => {
            if (!confirmed) return;

            let data = {
                name: name,
                issue: issue,
                user_id: tg.initDataUnsafe?.user?.id || null
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    };
</script>

</body>
</html>
